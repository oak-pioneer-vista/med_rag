services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474" # HTTP / Browser
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./data/neo4j_import:/import
    environment:
      - NEO4J_AUTH=neo4j/medragpass
      - NEO4J_PLUGINS=["apoc"]

  # HuggingFace Text Embeddings Inference serving MedTE on the host GPU.
  # Image tag `turing-latest` targets CUDA compute capability 7.5 (NVIDIA T4/Turing).
  # Swap to `89-latest` for L4/Ada (CC 8.9), or another tag matching your GPU.
  medte:
    image: ghcr.io/huggingface/text-embeddings-inference:turing-latest
    ports:
      - "8080:80"
    volumes:
      - medte_cache:/data
    environment:
      - HF_HOME=/data
    command:
      - --model-id=MohammadKhodadad/MedTE-cl15-step-8000
      - --pooling=mean
      - --max-batch-tokens=16384
      - --max-client-batch-size=64
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # BioLORD-2023: UMLS-synonymy-trained BERT encoder for semantic entity
  # linking. Same TEI image as MedTE so we get mean pooling + FP16 kernels
  # out of the box. Used by build_biolord_concept_index.py and
  # link_entities_to_cui_biolord.py — an apples-to-apples dense alternative
  # to the lexical linker in step 11.
  biolord:
    image: ghcr.io/huggingface/text-embeddings-inference:turing-latest
    ports:
      - "8081:80"
    volumes:
      - biolord_cache:/data
    environment:
      - HF_HOME=/data
    command:
      - --model-id=FremyCompany/BioLORD-2023
      - --pooling=mean
      - --max-batch-tokens=65536
      - --max-client-batch-size=1024
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  medte_cache:
  biolord_cache:
