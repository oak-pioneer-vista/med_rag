services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474" # HTTP / Browser
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./data/neo4j_import:/import
    environment:
      - NEO4J_AUTH=neo4j/medragpass
      - NEO4J_PLUGINS=["apoc"]

  # HuggingFace Text Embeddings Inference serving MedTE on the host GPU.
  # Image tag `89-latest` targets CUDA compute capability 8.9 (NVIDIA L4/Ada).
  medte:
    image: ghcr.io/huggingface/text-embeddings-inference:89-latest
    ports:
      - "8080:80"
    volumes:
      - medte_cache:/data
    environment:
      - HF_HOME=/data
    command:
      - --model-id=MohammadKhodadad/MedTE-cl15-step-8000
      - --pooling=mean
      - --max-batch-tokens=16384
      - --max-client-batch-size=64
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  medte_cache:
